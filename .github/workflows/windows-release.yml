name: Windows exe

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '5.15.2'
          host: windows
          target: desktop
          arch: win64_mingw81

      - name: Build release
        shell: pwsh
        run: |
          qmake escape_from_the_dungeon.pro CONFIG+=release
          mingw32-make -j2

      - name: Package release
        shell: pwsh
        run: |
          $packageDir = "dist\escape_from_the_dungeon-windows"
          New-Item -ItemType Directory -Force -Path $packageDir | Out-Null
          Copy-Item "release\escape_from_the_dungeon.exe" $packageDir
          & "$env:QT_ROOT_DIR\bin\windeployqt.exe" `
            "$packageDir\escape_from_the_dungeon.exe" `
            --release `
            --dir $packageDir `
            --plugindir "$env:QT_ROOT_DIR\plugins" `
            --compiler-runtime `
            --no-translations
          Compress-Archive -Path "$packageDir\*" -DestinationPath "escape_from_the_dungeon-universal.zip" -Force

      - name: Upload Windows package
        uses: actions/upload-artifact@v4
        with:
          name: escape_from_the_dungeon-universal
          path: escape_from_the_dungeon-universal.zip
