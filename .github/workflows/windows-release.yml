name: Windows exe

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '5.15.2'
          host: windows
          target: desktop
          arch: win64_mingw81

      - name: Build release
        shell: pwsh
        run: |
          qmake escape_from_the_dungeon.pro CONFIG+=release
          mingw32-make -j2

      - name: Package release
        shell: pwsh
        run: |
          $packageDir = "dist\escape_from_the_dungeon-windows"
          $qtBin = Join-Path $env:QT_ROOT_DIR "bin"
          $qtPlugins = Join-Path $env:QT_ROOT_DIR "plugins"
          $mingwMake = Get-Command mingw32-make.exe
          $mingwBin = Split-Path $mingwMake.Source

          New-Item -ItemType Directory -Force -Path $packageDir | Out-Null

          Copy-Item "release\escape_from_the_dungeon.exe" $packageDir
          Copy-Item (Join-Path $qtBin "Qt5Core.dll") $packageDir
          Copy-Item (Join-Path $qtBin "Qt5Gui.dll") $packageDir
          Copy-Item (Join-Path $qtBin "Qt5Widgets.dll") $packageDir

          Copy-Item (Join-Path $qtPlugins "platforms") $packageDir -Recurse

          Copy-Item (Join-Path $mingwBin "libgcc_s_seh-1.dll") $packageDir
          Copy-Item (Join-Path $mingwBin "libstdc++-6.dll") $packageDir
          Copy-Item (Join-Path $mingwBin "libwinpthread-1.dll") $packageDir

          if (Test-Path (Join-Path $qtBin "D3Dcompiler_47.dll")) {
            Copy-Item (Join-Path $qtBin "D3Dcompiler_47.dll") $packageDir
          }

          Compress-Archive -Path "$packageDir\*" -DestinationPath "escape_from_the_dungeon-universal.zip" -Force

      - name: Upload Windows package
        uses: actions/upload-artifact@v4
        with:
          name: escape_from_the_dungeon-universal
          path: escape_from_the_dungeon-universal.zip
